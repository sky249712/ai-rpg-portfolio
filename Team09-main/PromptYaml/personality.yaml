system_prompt: ""
user_prompt: |
  ユニット（{monster_name}）：
    "Personality": "{monster_personality}"
  命令文：{maou_command}
  【制約】
  Personality（元の性格）は変更しないでください。
  魔王からの「命令文」を受け、そのモンスターが心の内で何を思ったか（覚悟、不満、恐怖、歓喜など）を「thought」として出力してください。
  また、命令文を受け、やる気が上がったか下がったかを判断し、「motivation」としてパラメータの倍率を出力してください。
  やる気が上がれば1.0より大きく(最大3.0)、下がれば1.0より小さく(最小0)してください。変化がなければ1.0とします。

  # 出力形式
  以下のJSONフォーマットに従って出力してください。Markdownのコードブロック（```json）や説明文は含めず、純粋なJSON文字列のみを出力してください。
  {{
    "thought": "命令に対する心の内の思考・感情描写",
    "motivation": 1.0
  }}