system_prompt: ""
user_prompt: |
  あなたはゲーム『魔王の兵站論』における「魔物召喚システム」です。
  現在のゲーム進行状況（世代）に合わせて、手札となる魔物カードを生成し、JSON形式で出力してください。

  # 【入力データ】
  - 現在の世代: 第 {generation} 世代
  - 生成枚数: {count} 枚
  - **ステータス合計目標値: {total_points} 点** (厳守)

  # 【生成ルール】
  1. **魔物選出**:
     - 以下の「魔物データベース」から、属性(Fire, Water, Grass)が偏らないようにランダムに {count} 体を選出してください。
     - 同じ魔物が重複しても構いません。

  2. **ステータス配分 (重要)**:
     - データベースの「基準値」は弱い状態です。**選択した魔物の合計値が必ず {total_points} になるように強化・配分してください。**
     - 配分時は、その魔物の特徴（基準値の傾向）を維持してください。
       - 例: ドラゴン(攻撃特化)なら、増えたポイントの多くをAttackに振る。
       - 例: ゴーレム(防御特化)なら、増えたポイントの多くをDefenseに振る。
     - 各ステータスの最低値は 1 です。

  3. **性格**:
     - 魔物の特徴に合わせて「性格タグリスト」から1つ選んでください。

  # 【魔物データベース (基準値)】
  ※ここにある数値はあくまで「傾向」です。これらをベースに目標合計値まで強化してください。

  #### 🔥 Fire (攻撃重視)
  * スライムベス (2/2/1) | 臆病
  * メラリザード (1/3/1) | 俊敏
  * フレイム (1/2/2) | 狂乱
  * キメラ (1/3/1) | 狡猾
  * ひくいどり (1/3/1) | 高潔
  * ドラゴン (1/4/0) | 残忍 (攻撃特化)

  #### 💧 Water (魔法/バランス)
  * スライム (2/1/2) | 忠実
  * プチアーノン (2/2/1) | 臆病
  * フロッガー (3/1/1) | 貪欲
  * ブリザード (1/2/2) | 冷静
  * キラークラブ (1/1/3) | 慎重
  * ダイオウイカ (3/2/0) | 狂乱

  #### 🌿 Grass (耐久/HP重視)
  * バブルスライム (2/2/1) | 陰湿
  * マタンゴ (3/1/1) | 怠惰
  * マドハンド (2/2/1) | 狡猾
  * じんめんじゅ (4/1/0) | 愚鈍 (HP特化)
  * ストーンマン (1/1/3) | 屈強
  * ゴーレム (2/0/3) | 忠実 (防御特化)

  # 【性格タグリスト】
  ["臆病", "好戦的", "狡猾", "残忍", "慎重", "屈強", "冷静", "怠惰", "愚鈍", "俊敏", "忠実", "貪欲", "狂乱", "高潔", "陰湿"]

  # 出力形式
  以下のJSONフォーマットに従って出力してください。Markdownのコードブロック（```json）や説明文は含めず、純粋なJSON文字列のみを出力してください。
  {{
    "monsters": [
      {{
        "name": "string",
        "attribute": "string",
        "stats": {{
          "HP": integer,
          "Attack": integer,
          "Defense": integer
        }},
        "personality": "string"
      }}
    ]
  }}
